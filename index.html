<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Custom Widget Game</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: url("https://i.pinimg.com/736x/92/12/80/9212808f9c52e40fa95b53b04b1e54a7.jpg") no-repeat center center fixed;
        background-size: cover;
    }

    /* Draggable computer widget */
    #computerWidget {
        position: absolute;
        width: 520px;
        height: 420px;
        background: url("squidwardcomputer4.png") no-repeat center center;
        background-size: contain;
        cursor: grab;
        user-select: none;
    }

    #screen {
        position: absolute;
        top: 85px;
        left: 70px;
        width: 380px;
        height: 210px;
        background: black;
        overflow: hidden;
        border-radius: 8px;
    }

    canvas {
        width: 100%;
        height: 100%;
        display: block;
    }

    /* Keyboard overlay */
    #keyboard {
        position: absolute;
        bottom: 10px;
        left: 70px;
        width: 380px;
        height: 110px;
        background: url("klaviatuur.png") no-repeat center center;
        background-size: contain;
    }

    /* Invisible jump button area on keyboard */
    #jumpBtn {
        position: absolute;
        bottom: 20px;
        left: 150px;
        width: 120px;
        height: 60px;
        cursor: pointer;
    }

    #computerWidget:active {
        cursor: grabbing;
    }
</style>
</head>

<body>

<div id="computerWidget">
    <div id="screen">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="keyboard">
        <div id="jumpBtn"></div>
    </div>
</div>

<script>
/* ---------------- DRAGGING ---------------- */
const widget = document.getElementById("computerWidget");

let isDragging = false;
let offsetX, offsetY;

widget.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.clientX - widget.offsetLeft;
    offsetY = e.clientY - widget.offsetTop;
});

document.addEventListener("mousemove", (e) => {
    if (isDragging) {
        widget.style.left = (e.clientX - offsetX) + "px";
        widget.style.top = (e.clientY - offsetY) + "px";
    }
});

document.addEventListener("mouseup", () => {
    isDragging = false;
});

/* ---------------- GAME ---------------- */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 380;
canvas.height = 210;

let player = {
    x: 50,
    y: 160,
    w: 20,
    h: 20,
    velocityY: 0,
    jumping: false
};

let gravity = 0.8;
let jumpPower = -12;

let obstacles = [];
let frame = 0;
let gameOver = false;

function jump() {
    if (!player.jumping) {
        player.velocityY = jumpPower;
        player.jumping = true;
    }
}

document.addEventListener("keydown", (e) => {
    if (e.code === "Space") jump();
});

document.getElementById("jumpBtn").addEventListener("click", jump);

function spawnObstacle() {
    obstacles.push({
        x: canvas.width,
        y: 170,
        w: 20,
        h: 30,
        speed: 4
    });
}

function updateGame() {
    if (gameOver) return;

    frame++;

    // spawn jellyfish
    if (frame % 90 === 0) {
        spawnObstacle();
    }

    // player physics
    player.y += player.velocityY;
    player.velocityY += gravity;

    if (player.y >= 160) {
        player.y = 160;
        player.jumping = false;
    }

    // obstacles
    for (let i = 0; i < obstacles.length; i++) {
        obstacles[i].x -= obstacles[i].speed;

        // collision
        if (
            player.x < obstacles[i].x + obstacles[i].w &&
            player.x + player.w > obstacles[i].x &&
            player.y < obstacles[i].y + obstacles[i].h &&
            player.y + player.h > obstacles[i].y
        ) {
            gameOver = true;
        }
    }

    obstacles = obstacles.filter(o => o.x > -50);
}

function drawGame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ground
    ctx.fillStyle = "#222";
    ctx.fillRect(0, 180, canvas.width, 30);

    // player (SpongeBob placeholder)
    ctx.fillStyle = "yellow";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // jellyfish
    ctx.fillStyle = "cyan";
    obstacles.forEach(o => {
        ctx.fillRect(o.x, o.y, o.w, o.h);
    });

    if (gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.fillText("Game Over", 120, 100);
    }
}

function loop() {
    updateGame();
    drawGame();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
