<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squidward's PC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=VT323&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: url('taust.jpg') center/cover no-repeat;
    font-family: 'VT323', monospace;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: rgba(0,15,8,0.38);
    pointer-events: none;
    z-index: 0;
  }
  #gadget {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 454px; height: 411px;
    cursor: grab;
    user-select: none;
    z-index: 10;
    filter: drop-shadow(0 24px 64px rgba(0,0,0,0.9)) drop-shadow(0 4px 14px rgba(0,0,0,0.7));
  }
  #gadget:active { cursor: grabbing; }
  #gameCanvas {
    display: block;
    width: 299px;
    height: 209px;
    image-rendering: pixelated;
  }
  .btn-power { cursor: pointer; }
  .btn-power:hover { filter: brightness(1.45); }
  .btn-power:active { filter: brightness(0.65); }
  .btn-jump { cursor: pointer; }
  .btn-jump:hover { filter: brightness(1.3); }
  .btn-jump:active { filter: brightness(0.55) drop-shadow(0 2px 4px #00ff88); }
  .btn-play { cursor: pointer; }
  .btn-play:hover { filter: brightness(1.45); }
  .btn-play:active { filter: brightness(0.6); }
  .key-blob { cursor: pointer; }
  .key-blob:hover { filter: brightness(1.25) saturate(0.8); }
</style>
</head>
<body>
<div id="gadget">
<svg id="mainSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 454 411" width="454" height="411">
<defs>

    <stop offset="100%" stop-color="white" stop-opacity="0.0"/>

    <feBlend in="SourceGraphic" in2="specClip" mode="screen" result="blended"/>
    <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
  </filter>
  <filter id="keyBevel" x="-15%" y="-15%" width="130%" height="130%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>

        specularExponent="30" lighting-color="white" result="spec">

    </feSpecularLighting>
    <feComposite in="spec" in2="SourceAlpha" operator="in" result="specClip"/>
    <feBlend in="SourceGraphic" in2="specClip" mode="screen"/>
  </filter>

    <feGaussianBlur stdDeviation="3" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="btnGlow">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

<script>
// ============================================================
// The canvas is inside the SVG foreignObject clipped to the
// exact game_area path. The foreignObject is at SVG coords
// x=70.2, y=14.0, w=298.8, h=208.9
// Canvas resolution matches those pixel dims.
// Game coordinates: canvas is 299×209 px
// The game_area path (in canvas-local coords) is offset by
// (-70.2, -14.0) from SVG coords.
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CW = 299, CH = 209;

// The game_area path in CANVAS-LOCAL coords:
// SVG path anchor points shifted by (-70.2, -14.0)
// We'll use this as the clip region for the game content
const SCREEN_PATH_LOCAL = new Path2D((() => {
  // Translate the original SVG path by -70.2 x, -14.0 y
  // We rebuild the path string with all absolute coords shifted
  // Key absolute endpoint positions (from our trace):
  // M154.8,222.9 -> M84.6,208.9
  // All relative commands (c, h) stay the same; only M moves
  return "M84.6,208.9h132.4c8.3-3.2,19.6-8.3,31.8-16.5,10.9-7.3,23.7-15.9,34.1-31.2,6.2-9.1,18.3-30.6,15.9-58.8-2.5-29.9-19.8-49-27.1-57.1-16.2-17.9-34.1-25.7-49.4-32.4-19-8.2-35.6-11.5-45.9-12.9-22.6-3.2-40.6-1.2-48.8,0-17.8,2.6-30.8,7.4-39.4,10.6-9.3,3.5-20.7,7.8-34.1,16.5-19.5,12.6-30.7,26-32.9,28.8-5.2,6.4-11.3,14-15.9,25.9-2.5,6.4-6.1,16.1-5.3,28.8.6,9.2,3.2,15.5,7.1,24.7,2.2,5.4,7.2,16.3,16.5,28.2,1.7,2.2,7.2,9.2,15.9,17.1,8.4,7.6,23.1,19.1,45.3,28.2Z";
})());

// ============================================================
// DRAGGABLE GADGET
// ============================================================
const gadget = document.getElementById('gadget');
let dragState = null;

gadget.addEventListener('mousedown', e => {
  if (e.target === canvas) return;
  const r = gadget.getBoundingClientRect();
  gadget.style.transform = 'none';
  gadget.style.left = r.left + 'px';
  gadget.style.top  = r.top  + 'px';
  dragState = { ox: e.clientX - r.left, oy: e.clientY - r.top };
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!dragState) return;
  gadget.style.left = (e.clientX - dragState.ox) + 'px';
  gadget.style.top  = (e.clientY - dragState.oy) + 'px';
});
window.addEventListener('mouseup', () => { dragState = null; });

// ============================================================
// GAME STATE
// ============================================================
const GROUND_Y   = CH - 30;   // floor y in canvas coords
const GRAVITY    = 0.52;
const JUMP_VEL   = -11.5;
const SPEED_INIT = 2.8;
const SPEED_MAX  = 8.0;

let gameState = 'off'; // off | idle | running | dead
let score = 0, hiScore = 0, frameCount = 0;
let speed, bgOffset;
let player, obstacles, lastSpawn;

function initGame() {
  player = { x: 40, y: GROUND_Y - 36, vy: 0, w: 22, h: 36, onGround: true };
  obstacles = [];
  bgOffset  = 0;
  speed     = SPEED_INIT;
  score     = 0;
  frameCount = 0;
  lastSpawn  = 0;
}

// ============================================================
// DRAWING
// ============================================================
function drawBg() {
  // Deep ocean
  const bg = ctx.createLinearGradient(0, 0, 0, CH);
  bg.addColorStop(0, '#091c2e');
  bg.addColorStop(1, '#050e18');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, CW, CH);

  // Distant coral silhouettes
  ctx.fillStyle = 'rgba(20,60,90,0.7)';
  for (let i = 0; i < 4; i++) {
    const cx2 = ((i * 95 + bgOffset * 0.15) % (CW + 80)) - 30;
    ctx.beginPath();
    ctx.moveTo(cx2, GROUND_Y);
    ctx.bezierCurveTo(cx2 + 5, GROUND_Y - 30, cx2 + 15, GROUND_Y - 50, cx2 + 20, GROUND_Y - 45);
    ctx.bezierCurveTo(cx2 + 25, GROUND_Y - 50, cx2 + 35, GROUND_Y - 30, cx2 + 40, GROUND_Y);
    ctx.fill();
  }

  // Bubbles
  ctx.fillStyle = 'rgba(80,180,255,0.12)';
  for (let i = 0; i < 10; i++) {
    const bx = ((i * 29 + bgOffset * 0.4) % (CW + 20));
    const by = ((i * 19 + frameCount * 0.3 + i * 7) % (GROUND_Y + 10));
    const br = 1.5 + (i % 3);
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
  }

  // Sandy floor
  const sand = ctx.createLinearGradient(0, GROUND_Y, 0, CH);
  sand.addColorStop(0, '#c8a050'); sand.addColorStop(1, '#8a6828');
  ctx.fillStyle = sand;
  ctx.fillRect(0, GROUND_Y, CW, CH - GROUND_Y);

  // Ground line
  ctx.strokeStyle = 'rgba(240,190,70,0.7)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(CW, GROUND_Y); ctx.stroke();

  // Pebbles
  ctx.fillStyle = 'rgba(160,120,50,0.55)';
  for (let i = 0; i < 14; i++) {
    const px = ((i * 47 + bgOffset * 0.55) % (CW + 20));
    ctx.beginPath(); ctx.ellipse(px, GROUND_Y + 4, 3.5 + i % 3, 1.8, 0, 0, Math.PI * 2); ctx.fill();
  }

  // Seaweed
  for (let s = 0; s < 6; s++) {
    const sx = ((s * 65 + bgOffset * 0.9) % (CW + 80)) - 30;
    const sh = 18 + (s % 3) * 8;
    const sw = Math.sin(frameCount * 0.05 + s) * 5;
    ctx.strokeStyle = `rgba(20,${120 + s * 10},40,0.75)`; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(sx, GROUND_Y);
    ctx.quadraticCurveTo(sx + sw, GROUND_Y - sh * 0.55, sx + sw * 0.5, GROUND_Y - sh);
    ctx.stroke();
  }
}

function drawSpongebob(px, py, dead) {
  const W = 22, H = 36;
  const x = px, y = py;
  // Body (sponge, yellow rectangle with rounded look)
  ctx.fillStyle = '#f0cc30';
  ctx.beginPath();
  ctx.roundRect(x, y, W, H * 0.75, 3);
  ctx.fill();
  // Sponge holes
  ctx.fillStyle = 'rgba(160,100,0,0.22)';
  [[x+5,y+8,2.2],[x+14,y+6,1.8],[x+8,y+15,2],[x+16,y+14,2.5],[x+5,y+22,1.8],[x+13,y+21,2]].forEach(([hx,hy,hr])=>{
    ctx.beginPath(); ctx.arc(hx,hy,hr,0,Math.PI*2); ctx.fill();
  });
  // White shirt
  ctx.fillStyle = '#f8f8f0';
  ctx.fillRect(x+2, y+H*0.32, W-4, H*0.28);
  // Red tie
  ctx.fillStyle = '#cc1818';
  ctx.beginPath();
  ctx.moveTo(x+W/2, y+H*0.30); ctx.lineTo(x+W/2+4, y+H*0.55);
  ctx.lineTo(x+W/2, y+H*0.60); ctx.lineTo(x+W/2-4, y+H*0.55); ctx.closePath(); ctx.fill();
  // Brown pants
  ctx.fillStyle = '#7a4820';
  ctx.fillRect(x, y+H*0.62, W, H*0.22);
  // Belt
  ctx.fillStyle = '#c89030'; ctx.fillRect(x, y+H*0.60, W, H*0.05);
  ctx.fillStyle = '#d4a828'; ctx.fillRect(x+W*0.38, y+H*0.58, W*0.24, H*0.09);
  // Shoes
  const legAnim = dead ? 0 : Math.sin(frameCount * 0.38) * 3;
  ctx.fillStyle = '#181818';
  ctx.beginPath(); ctx.ellipse(x+5, y+H+legAnim, 5, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+W-5, y+H-legAnim, 5, 3, 0, 0, Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.ellipse(x+7, y+H*0.14, 4, 4.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+W-7, y+H*0.14, 4, 4.5, 0, 0, Math.PI*2); ctx.fill();
  if (dead) {
    // X eyes
    ctx.strokeStyle='#1a3a70'; ctx.lineWidth=1.5;
    [[x+5,y+9,x+9,y+13],[x+9,y+9,x+5,y+13],[x+W-9,y+9,x+W-5,y+13],[x+W-5,y+9,x+W-9,y+13]].forEach(([x1,y1,x2,y2])=>{
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    });
  } else {
    ctx.fillStyle = '#1a3a80';
    ctx.beginPath(); ctx.ellipse(x+8, y+H*0.15, 2, 2.5, 0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+W-8, y+H*0.15, 2, 2.5, -0.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(x+6.5, y+H*0.12, 0.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+W-8.5, y+H*0.12, 0.8, 0, Math.PI*2); ctx.fill();
  }
  // Nose
  ctx.fillStyle = '#e8b420';
  ctx.beginPath(); ctx.ellipse(x+W/2, y+H*0.27, 2.5, 3, 0, 0, Math.PI*2); ctx.fill();
  // Mouth
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.4;
  ctx.beginPath();
  if (dead) { ctx.arc(x+W/2, y+H*0.42, 6, 0, Math.PI, false); }
  else       { ctx.arc(x+W/2, y+H*0.32, 6, 0.15, Math.PI-0.15); }
  ctx.stroke();
  // Teeth
  if (!dead) {
    ctx.fillStyle = 'white';
    ctx.fillRect(x+W/2-5, y+H*0.34, 4.5, H*0.07);
    ctx.fillRect(x+W/2+0.5, y+H*0.34, 4.5, H*0.07);
    ctx.strokeStyle='#ccc'; ctx.lineWidth=0.4;
    ctx.strokeRect(x+W/2-5, y+H*0.34, 4.5, H*0.07);
    ctx.strokeRect(x+W/2+0.5, y+H*0.34, 4.5, H*0.07);
  }
}

// Obstacle type definitions
const OBS_TYPES = [
  { w:26, h:34,
    draw(ctx,x,y,t){
      const b=Math.sin(t*0.09)*3;
      const g=ctx.createRadialGradient(x+13,y+10+b,1,x+13,y+10+b,13);
      g.addColorStop(0,'#f080e0'); g.addColorStop(1,'#a020a0');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.ellipse(x+13,y+10+b,13,10,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,200,255,0.45)';
      ctx.beginPath(); ctx.ellipse(x+9,y+7+b,3,3,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x+17,y+9+b,2.5,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(210,80,210,0.65)'; ctx.lineWidth=1.1;
      for(let i=0;i<4;i++){
        ctx.beginPath();
        ctx.moveTo(x+5+i*5,y+20+b);
        ctx.quadraticCurveTo(x+3+i*6+Math.sin(t*0.07+i)*5,y+27+b,x+4+i*5,y+34+b);
        ctx.stroke();
      }
    }
  },
  { w:30, h:28,
    draw(ctx,x,y,t){
      const sg=ctx.createRadialGradient(x+15,y+13,2,x+15,y+13,13);
      sg.addColorStop(0,'#e8d070'); sg.addColorStop(1,'#9a6a20');
      ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(x+15,y+13,13,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#7a5018'; ctx.lineWidth=1.1;
      ctx.beginPath(); ctx.arc(x+15,y+13,8,0,Math.PI*1.6); ctx.stroke();
      ctx.beginPath(); ctx.arc(x+15,y+13,4,0,Math.PI); ctx.stroke();
      ctx.fillStyle='#c8a0e0'; ctx.fillRect(x+1,y+20,18,9);
      ctx.beginPath(); ctx.arc(x+5,y+20,4,Math.PI,0); ctx.fill();
      ctx.strokeStyle='#c8a0e0'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(x+4,y+17); ctx.lineTo(x+1,y+10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+7,y+17); ctx.lineTo(x+6,y+9); ctx.stroke();
      ctx.fillStyle='#282820';
      ctx.beginPath(); ctx.arc(x+1,y+9,2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+6,y+8,2,0,Math.PI*2); ctx.fill();
    }
  },
  { w:30, h:38,
    draw(ctx,x,y,t){
      ctx.fillStyle='#c87038'; ctx.fillRect(x+2,y+29,26,8);
      ctx.beginPath(); ctx.arc(x+15,y+29,14,Math.PI,0); ctx.fill();
      ctx.fillStyle='#6a2e0e'; ctx.fillRect(x+2,y+22,26,8);
      ctx.fillStyle='#f0c028'; ctx.fillRect(x,y+20,30,4);
      ctx.fillStyle='#38a838'; ctx.fillRect(x,y+17,30,4);
      ctx.fillStyle='#c87038'; ctx.fillRect(x+2,y+7,26,11);
      ctx.beginPath(); ctx.arc(x+15,y+9,14,Math.PI,0); ctx.fill();
      ctx.fillStyle='#e8d078';
      for(let i=0;i<3;i++) ctx.fillRect(x+7+i*8,y+4,5,2);
    }
  }
];

function spawnObstacle() {
  const type = OBS_TYPES[Math.floor(Math.random() * OBS_TYPES.length)];
  obstacles.push({ x: CW + 10, y: GROUND_Y - type.h, type, t: 0 });
}

function drawHUD() {
  ctx.font = "bold 13px 'VT323',monospace";
  ctx.fillStyle = 'rgba(100,255,140,0.85)';
  ctx.textAlign = 'right';
  ctx.fillText('HI ' + String(Math.floor(hiScore)).padStart(5,'0'), CW - 5, 16);
  ctx.fillText(String(Math.floor(score)).padStart(5,'0'), CW - 5, 30);
  ctx.textAlign = 'left';
}

function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.055)';
  for (let sy = 0; sy < CH; sy += 3) ctx.fillRect(0, sy, CW, 1);
  const vig = ctx.createRadialGradient(CW/2,CH/2,CH*0.25,CW/2,CH/2,CH*0.85);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.42)');
  ctx.fillStyle = vig; ctx.fillRect(0,0,CW,CH);
}

function checkCollision(p, o) {
  const margin = 4;
  return (
    p.x + margin < o.x + o.type.w - margin &&
    p.x + p.w - margin > o.x + margin &&
    p.y + margin < o.y + o.type.h - margin &&
    p.y + p.h - margin > o.y + margin
  );
}

// ============================================================
// GAME LOOP
// ============================================================
let rafId = null;

function gameLoop() {
  if (gameState === 'off') return;
  rafId = requestAnimationFrame(gameLoop);
  frameCount++;

  // Clip everything to the screen shape
  ctx.save();
  ctx.clip(SCREEN_PATH_LOCAL);

  drawBg();

  if (gameState === 'idle') {
    const bob = Math.sin(frameCount * 0.09) * 3;
    drawSpongebob(player.x, GROUND_Y - player.h + bob, false);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(30, CH/2 - 32, CW - 60, 52);
    ctx.fillStyle = 'rgba(80,255,140,0.95)';
    ctx.font = "bold 18px 'VT323',monospace"; ctx.textAlign='center';
    ctx.fillText('PRESS JUMP TO START', CW/2, CH/2 - 12);
    ctx.fillStyle = 'rgba(80,200,255,0.75)';
    ctx.font = "13px 'VT323',monospace";
    ctx.fillText('SpongeBob Runner', CW/2, CH/2 + 10);
    ctx.textAlign='left';
    drawScanlines();
    ctx.restore();
    return;
  }

  if (gameState === 'running') {
    speed = Math.min(SPEED_MAX, SPEED_INIT + score * 0.001);
    bgOffset += speed;
    score += speed * 0.045;
    if (score > hiScore) hiScore = score;

    // Spawn
    const minGap = Math.max(90, 160 - score * 0.05);
    if (frameCount - lastSpawn > minGap / speed + Math.random() * 40) {
      if (obstacles.length < 3) { spawnObstacle(); lastSpawn = frameCount; }
    }

    // Physics
    player.vy += GRAVITY;
    player.y  += player.vy;
    if (player.y >= GROUND_Y - player.h) {
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      player.onGround = true;
    }

    // Obstacles
    for (const o of obstacles) {
      o.x -= speed; o.t++;
      o.type.draw(ctx, o.x, o.y, o.t);
      if (checkCollision(player, o)) { gameState = 'dead'; }
    }
    obstacles = obstacles.filter(o => o.x + o.type.w > -10);

    drawSpongebob(player.x, player.y, false);
    drawHUD();
    drawScanlines();
  }

  if (gameState === 'dead') {
    for (const o of obstacles) o.type.draw(ctx, o.x, o.y, o.t);
    drawSpongebob(player.x, player.y, true);
    ctx.fillStyle = 'rgba(0,0,0,0.52)';
    ctx.fillRect(20, CH/2 - 30, CW - 40, 56);
    ctx.fillStyle = '#ff5050'; ctx.font = "bold 22px 'VT323',monospace"; ctx.textAlign='center';
    ctx.fillText('GAME OVER', CW/2, CH/2 - 8);
    ctx.fillStyle = 'rgba(100,255,140,0.9)'; ctx.font="14px 'VT323',monospace";
    ctx.fillText('PRESS JUMP TO RETRY', CW/2, CH/2 + 15);
    ctx.textAlign='left';
    drawHUD();
    drawScanlines();
  }

  ctx.restore();
}

const GITHUB_RAW = 'https://raw.githubusercontent.com/liiisanomm/liiisanomm.github.io/main/Spongebob SquarePants Theme song (NEW HD) Episode Opening  Credits Nick Animation';

const bgm = new Audio(GITHUB_RAW);
bgm.loop = true;
bgm.volume = 0.7;

function playMusic() { bgm.currentTime = 0; bgm.play().catch(() => {}); }
function stopMusic() { bgm.pause(); bgm.currentTime = 0; }

// ============================================================
// CONTROLS
// ============================================================
let screenOn = false;

function turnOn() {
  screenOn = true;
  gameState = 'idle';
  initGame();
  if (rafId) cancelAnimationFrame(rafId);
  playMusic();
  gameLoop();
}

function turnOff() {
  screenOn = false;
  gameState = 'off';
  stopMusic();
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  ctx.save();
  ctx.clip(SCREEN_PATH_LOCAL);
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,CW,CH);
  // "POWERED OFF" text
  ctx.fillStyle = 'rgba(30,100,50,0.6)'; ctx.font = "14px 'VT323',monospace"; ctx.textAlign='center';
  ctx.fillText('POWERED OFF', CW/2, CH/2+5);
  ctx.textAlign='left';
  ctx.restore();
}

function jump() {
  if (!screenOn) return;
  if (gameState === 'idle' || gameState === 'dead') { initGame(); gameState = 'running'; return; }
  if (gameState === 'running' && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
  }
}

// Initial state
ctx.fillStyle = '#000'; ctx.fillRect(0,0,CW,CH);
ctx.fillStyle = 'rgba(30,100,50,0.6)'; ctx.font="14px 'VT323',monospace"; ctx.textAlign='center';
ctx.fillText('POWERED OFF', CW/2, CH/2+5); ctx.textAlign='left';

document.getElementById('btnPower').addEventListener('click', () => {
  if (!screenOn) turnOn(); else turnOff();
});
document.getElementById('btnJump').addEventListener('click', jump);
document.getElementById('btnPlay').addEventListener('click', () => {
  if (!screenOn) { turnOn(); return; }
  jump();
});
canvas.addEventListener('click', jump);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});
document.getElementById('btnJump').addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});
</script>
