<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Squidward Computer Game</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        user-select:none;
    }

    body{
        overflow:hidden;
        width:100vw;
        height:100vh;
        font-family:Arial, sans-serif;

        /* FULL BACKGROUND */
        background-image:url("https://i.pinimg.com/736x/92/12/80/9212808f9c52e40fa95b53b04b1e54a7.jpg");
        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;
    }

    /* =========================
       DRAGGABLE COMPUTER
    ========================== */
    #computerWidget{
        position:absolute;
        width:900px;
        height:650px;
        left:50%;
        top:50%;
        transform:translate(-50%, -50%);
        cursor:grab;
    }

    #computerWidget.dragging{
        cursor:grabbing;
    }

    /* COMPUTER IMAGE */
    #computerShell{
        position:absolute;
        width:100%;
        height:100%;
        object-fit:contain;
        pointer-events:none;
    }

    /* =========================
       GAME SCREEN AREA
       Adjust values to perfectly fit
       your squidwardcomputer3.png
    ========================== */
    #screenArea{
        position:absolute;

        top:105px;
        left:205px;

        width:485px;
        height:285px;

        overflow:hidden;
        border-radius:8px;
        background:#ffffff;
        border:4px solid #000;
    }

    canvas{
        width:100%;
        height:100%;
        display:block;
        background:linear-gradient(to bottom, #8ee7ff, #ffffff);
    }

    /* =========================
       KEYBOARD BUTTON MAP
       (using klaviatuur.png)
    ========================== */

    #keyboardOverlay{
        position:absolute;

        left:180px;
        bottom:85px;

        width:540px;
        height:135px;

        pointer-events:none;
    }

    .keyButton{
        position:absolute;
        pointer-events:auto;

        background:rgba(255,255,255,0);
        border:none;
        cursor:pointer;
    }

    .keyButton:hover{
        background:rgba(255,255,255,0.08);
    }

    /* BIG SPACE BUTTON */
    #jumpButton{
        left:110px;
        top:55px;
        width:320px;
        height:45px;
    }

    /* LEFT BUTTON */
    #leftButton{
        left:25px;
        top:55px;
        width:70px;
        height:45px;
    }

    /* RIGHT BUTTON */
    #rightButton{
        right:25px;
        top:55px;
        width:70px;
        height:45px;
    }

    /* SCORE */
    #score{
        position:absolute;
        top:10px;
        left:15px;
        font-size:22px;
        font-weight:bold;
        color:#000;
        z-index:10;
    }

    #gameOver{
        position:absolute;
        inset:0;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        background:rgba(0,0,0,0.5);
        color:white;
        font-size:32px;
        font-weight:bold;
        opacity:0;
        pointer-events:none;
        transition:0.3s;
    }

    #gameOver.show{
        opacity:1;
        pointer-events:auto;
    }

    #restartBtn{
        margin-top:20px;
        padding:12px 24px;
        border:none;
        border-radius:12px;
        background:#ffeb3b;
        cursor:pointer;
        font-size:20px;
        font-weight:bold;
    }

</style>
</head>

<body>

<!-- =========================
     COMPUTER WIDGET
========================= -->
<div id="computerWidget">

    <!-- COMPUTER IMAGE -->
    <img id="computerShell" src="squidwardcomputer3.png" alt="computer"/>

    <!-- GAME SCREEN -->
    <div id="screenArea">

        <div id="score">Score: 0</div>

        <canvas id="gameCanvas" width="485" height="285"></canvas>

        <div id="gameOver">
            GAME OVER
            <button id="restartBtn">RESTART</button>
        </div>

    </div>

    <!-- KEYBOARD INTERACTIVE AREAS -->
    <div id="keyboardOverlay">

        <button class="keyButton" id="leftButton"></button>
        <button class="keyButton" id="jumpButton"></button>
        <button class="keyButton" id="rightButton"></button>

    </div>

</div>

<script>
/* ===================================================
   DRAGGABLE COMPUTER
=================================================== */

const widget = document.getElementById("computerWidget");

let isDragging = false;
let offsetX = 0;
let offsetY = 0;

widget.addEventListener("mousedown", (e) => {

    // prevent dragging when clicking keyboard buttons
    if(e.target.classList.contains("keyButton")) return;

    isDragging = true;
    widget.classList.add("dragging");

    offsetX = e.clientX - widget.offsetLeft;
    offsetY = e.clientY - widget.offsetTop;
});

document.addEventListener("mousemove", (e) => {
    if(!isDragging) return;

    widget.style.left = `${e.clientX - offsetX}px`;
    widget.style.top = `${e.clientY - offsetY}px`;
    widget.style.transform = `translate(0,0)`;
});

document.addEventListener("mouseup", () => {
    isDragging = false;
    widget.classList.remove("dragging");
});


/* ===================================================
   GAME
=================================================== */

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const gameOverEl = document.getElementById("gameOver");
const restartBtn = document.getElementById("restartBtn");

let score = 0;
let gameRunning = true;

/* =========================
   SPONGEBOB
========================= */

const player = {
    x: 60,
    y: 180,
    width: 55,
    height: 70,
    velocityY: 0,
    gravity: 0.7,
    jumpForce: -14,
    grounded: true
};

/* =========================
   JELLYFISH
========================= */

let obstacles = [];

function createObstacle(){
    const size = 50 + Math.random() * 20;

    obstacles.push({
        x: canvas.width + 50,
        y: 190,
        width: size,
        height: size,
        speed: 6 + Math.random() * 2
    });
}

setInterval(() => {
    if(gameRunning){
        createObstacle();
    }
}, 1600);


/* ===================================================
   DRAW FUNCTIONS
=================================================== */

function drawPlayer(){

    // BODY
    ctx.fillStyle = "#ffe23b";
    ctx.fillRect(player.x, player.y, player.width, player.height);

    // EYES
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(player.x + 18, player.y + 20, 8, 0, Math.PI * 2);
    ctx.arc(player.x + 38, player.y + 20, 8, 0, Math.PI * 2);
    ctx.fill();

    // PUPILS
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(player.x + 18, player.y + 20, 3, 0, Math.PI * 2);
    ctx.arc(player.x + 38, player.y + 20, 3, 0, Math.PI * 2);
    ctx.fill();

    // SMILE
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x + 28, player.y + 40, 10, 0, Math.PI);
    ctx.stroke();
}

function drawObstacle(ob){

    // JELLYFISH TOP
    ctx.fillStyle = "#ff5fd7";

    ctx.beginPath();
    ctx.arc(
        ob.x + ob.width / 2,
        ob.y + ob.height / 2 - 10,
        ob.width / 2,
        Math.PI,
        0
    );

    ctx.fill();

    // BODY
    ctx.fillRect(
        ob.x,
        ob.y + 10,
        ob.width,
        ob.height / 2
    );

    // TENTACLES
    ctx.strokeStyle = "#ff5fd7";
    ctx.lineWidth = 3;

    for(let i=0;i<4;i++){

        ctx.beginPath();

        const startX = ob.x + 10 + i*12;
        const startY = ob.y + ob.height / 2 + 10;

        ctx.moveTo(startX, startY);

        ctx.lineTo(
            startX + Math.sin(Date.now()/100 + i)*8,
            startY + 20
        );

        ctx.stroke();
    }
}


/* ===================================================
   UPDATE
=================================================== */

function update(){

    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // FLOOR
    ctx.fillStyle = "#5dd65d";
    ctx.fillRect(0, 250, canvas.width, 35);

    /* PLAYER PHYSICS */

    player.velocityY += player.gravity;
    player.y += player.velocityY;

    // ground
    if(player.y >= 180){
        player.y = 180;
        player.velocityY = 0;
        player.grounded = true;
    }

    drawPlayer();

    /* OBSTACLES */

    for(let i = obstacles.length - 1; i >= 0; i--){

        const ob = obstacles[i];

        ob.x -= ob.speed;

        drawObstacle(ob);

        // collision
        if(
            player.x < ob.x + ob.width &&
            player.x + player.width > ob.x &&
            player.y < ob.y + ob.height &&
            player.y + player.height > ob.y
        ){
            endGame();
        }

        // score
        if(!ob.scored && ob.x + ob.width < player.x){
            ob.scored = true;
            score++;
            scoreEl.innerText = "Score: " + score;
        }

        // remove
        if(ob.x + ob.width < -50){
            obstacles.splice(i,1);
        }
    }

    requestAnimationFrame(update);
}

update();


/* ===================================================
   CONTROLS
=================================================== */

function jump(){

    if(player.grounded){
        player.velocityY = player.jumpForce;
        player.grounded = false;
    }
}

// keyboard
document.addEventListener("keydown", (e) => {

    if(e.code === "Space" || e.code === "ArrowUp"){
        jump();
    }
});

// clickable keyboard buttons
document.getElementById("jumpButton").addEventListener("click", jump);

document.getElementById("leftButton").addEventListener("click", () => {
    widget.style.transform += " rotate(-1deg)";
});

document.getElementById("rightButton").addEventListener("click", () => {
    widget.style.transform += " rotate(1deg)";
});


/* ===================================================
   GAME OVER
=================================================== */

function endGame(){
    gameRunning = false;
    gameOverEl.classList.add("show");
}

restartBtn.addEventListener("click", () => {

    obstacles = [];
    score = 0;

    scoreEl.innerText = "Score: 0";

    player.y = 180;
    player.velocityY = 0;

    gameRunning = true;

    gameOverEl.classList.remove("show");

    update();
});

</script>

</body>
</html>

<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Squidward Computer</title>

<style>

    margin:0;
    padding:0;

}

body{
    overflow:hidden;
    width:100vw;
    height:100vh;

    background-image:url("https://i.pinimg.com/736x/92/12/80/9212808f9c52e40fa95b53b04b1e54a7.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* ====================================
   COMPUTER WIDGET
==================================== */

#computerWidget{
    position:absolute;

    width:950px;
    height:700px;

    left:50%;
    top:50%;

    transform:translate(-50%, -50%);

    cursor:grab;
}

#computerWidget.dragging{

}

#computerShell{
    position:absolute;

    z-index:5;
    pointer-events:none;
}

/* ====================================
   GAME INSIDE SCREEN
==================================== */

#screenArea{
    position:absolute;

    /* POSITION INSIDE COMPUTER */
    top:112px;
    left:225px;

    width:455px;
    height:250px;

    z-index:1;

    overflow:hidden;

    /* OVAL CRT SHAPE */
    border-radius:50% / 42%;

    /* CRT LOOK */
    background:#c8f8ff;

    box-shadow:
        inset 0 0 30px rgba(255,255,255,0.6),
        inset 0 0 80px rgba(0,255,255,0.2),
        0 0 20px rgba(0,255,255,0.25);

    border:5px solid rgba(0,0,0,0.45);
}

/* DARK CRT EDGES */
#screenArea::before{
    content:"";
    position:absolute;
    inset:0;

    border-radius:50% / 42%;

    background:
    radial-gradient(
        ellipse at center,
        rgba(255,255,255,0) 45%,
        rgba(0,0,0,0.22) 100%
    );

    z-index:4;
    pointer-events:none;
}

/* CRT REFLECTION */
#screenArea::after{
    content:"";
    position:absolute;

    top:10px;
    left:30px;

    width:160px;
    height:60px;

    background:rgba(255,255,255,0.22);

    border-radius:50%;

    transform:rotate(-10deg);

    filter:blur(3px);

    z-index:4;
}

/* ====================================
   GAME CANVAS
==================================== */

canvas{
    position:absolute;
    width:100%;
    height:100%;
    z-index:2;
}

   SCORE

    position:absolute;
    top:18px;
    left:25px;

    z-index:10;

    font-size:22px;
    font-weight:bold;
    color:#001d2b;

    text-shadow:0 0 5px rgba(255,255,255,0.8);
}

/* ====================================
   GAME OVER
==================================== */

#gameOver{
    position:absolute;
    inset:0;

    z-index:20;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:rgba(0,0,0,0.45);

    color:white;
    font-size:32px;
    font-weight:bold;

    opacity:0;
    pointer-events:none;

    transition:0.3s;
}

#gameOver.show{
    opacity:1;
    pointer-events:auto;
}

#restartBtn{
    margin-top:20px;
    padding:12px 24px;

    border:none;
    border-radius:12px;

    background:#ffe600;

    font-size:20px;
    font-weight:bold;

    cursor:pointer;
}

/* ====================================
   KEYBOARD BUTTON AREAS
==================================== */

#keyboardOverlay{
    position:absolute;

    left:185px;
    bottom:95px;

    width:540px;
    height:135px;

    z-index:50;
}

.keyButton{
    position:absolute;

    background:rgba(255,255,255,0);
    border:none;

    cursor:pointer;
}

.keyButton:hover{
    background:rgba(255,255,255,0.06);
}

/* SPACE BUTTON */
#jumpButton{
    left:110px;
    top:58px;

    width:320px;
    height:42px;
}

/* LEFT */
#leftButton{
    left:28px;
    top:58px;

    width:65px;
    height:42px;
}

/* RIGHT */
#rightButton{
    right:28px;
    top:58px;

    width:65px;
    height:42px;
}

</style>
</head>

<body>

<div id="computerWidget">

    <!-- COMPUTER -->
    <img id="computerShell" src="squidwardcomputer3.png">

    <!-- GAME INSIDE MONITOR -->
    <div id="screenArea">

        <div id="score">0</div>

        <canvas id="gameCanvas" width="455" height="250"></canvas>

        <div id="gameOver">
            GAME OVER
            <button id="restartBtn">RESTART</button>
        </div>

    </div>

    <!-- INVISIBLE BUTTONS -->
    <div id="keyboardOverlay">

        <button class="keyButton" id="leftButton"></button>
        <button class="keyButton" id="jumpButton"></button>
        <button class="keyButton" id="rightButton"></button>

    </div>

</div>

<script>

/* ====================================
   DRAGGABLE COMPUTER
==================================== */

const widget = document.getElementById("computerWidget");

let dragging = false;
let offsetX = 0;
let offsetY = 0;

widget.addEventListener("mousedown", (e)=>{

    if(e.target.classList.contains("keyButton")) return;

    dragging = true;

    widget.classList.add("dragging");

    offsetX = e.clientX - widget.offsetLeft;
    offsetY = e.clientY - widget.offsetTop;
});

document.addEventListener("mousemove",(e)=>{

    if(!dragging) return;

    widget.style.left = `${e.clientX - offsetX}px`;
    widget.style.top = `${e.clientY - offsetY}px`;

    widget.style.transform = "translate(0,0)";
});

document.addEventListener("mouseup", ()=>{

    dragging = false;
    widget.classList.remove("dragging");
});


/* ====================================
   GAME
==================================== */

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const gameOverEl = document.getElementById("gameOver");
const restartBtn = document.getElementById("restartBtn");

let score = 0;
let gameRunning = true;

/* ====================================
   PLAYER
==================================== */

const player = {
    x:70,
    y:145,
    width:42,
    height:58,

    velocityY:0,
    gravity:0.75,
    jumpForce:-13,

    grounded:true
};

/* ====================================
   OBSTACLES
==================================== */

let obstacles = [];

function createObstacle(){

    obstacles.push({

        x:canvas.width + 50,

        y:165,

        width:42,
        height:42,

        speed:5 + Math.random() * 2
    });
}

setInterval(()=>{

    if(gameRunning){
        createObstacle();
    }

}, 1600);


/* ====================================
   DRAW PLAYER
==================================== */

function drawPlayer(){

    // BODY
    ctx.fillStyle = "#ffe138";

    ctx.fillRect(
        player.x,
        player.y,
        player.width,
        player.height
    );

    // EYES
    ctx.fillStyle = "white";

    ctx.beginPath();
    ctx.arc(player.x + 13, player.y + 16, 6, 0, Math.PI*2);
    ctx.arc(player.x + 28, player.y + 16, 6, 0, Math.PI*2);
    ctx.fill();

    // PUPILS
    ctx.fillStyle = "black";

    ctx.beginPath();
    ctx.arc(player.x + 13, player.y + 16, 2, 0, Math.PI*2);
    ctx.arc(player.x + 28, player.y + 16, 2, 0, Math.PI*2);
    ctx.fill();

    // SMILE
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.arc(player.x + 20, player.y + 34, 8, 0, Math.PI);
    ctx.stroke();
}

/* ====================================
   DRAW JELLYFISH
==================================== */

function drawObstacle(ob){

    ctx.fillStyle = "#ff5fcf";

    // TOP
    ctx.beginPath();

    ctx.arc(
        ob.x + ob.width/2,
        ob.y + ob.height/2 - 4,
        ob.width/2,
        Math.PI,
        0
    );

    ctx.fill();

    // BODY
    ctx.fillRect(
        ob.x,
        ob.y + 8,
        ob.width,
        ob.height/2
    );

    // TENTACLES
    ctx.strokeStyle = "#ff5fcf";
    ctx.lineWidth = 2;

    for(let i=0;i<4;i++){

        ctx.beginPath();

        const sx = ob.x + 8 + i*8;
        const sy = ob.y + 25;

        ctx.moveTo(sx, sy);

        ctx.lineTo(
            sx + Math.sin(Date.now()/150 + i)*5,
            sy + 15
        );

        ctx.stroke();
    }
}

/* ====================================
   GAME LOOP
==================================== */

function update(){

    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* WATER BACKGROUND */

    const gradient = ctx.createLinearGradient(0,0,0,250);

    gradient.addColorStop(0, "#7be7ff");
    gradient.addColorStop(1, "#dfffff");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    /* FLOOR */

    ctx.fillStyle = "#65d95e";
    ctx.fillRect(0,205,canvas.width,45);

    /* PLAYER PHYSICS */

    player.velocityY += player.gravity;
    player.y += player.velocityY;

    if(player.y >= 145){

        player.y = 145;
        player.velocityY = 0;

        player.grounded = true;
    }

    drawPlayer();

    /* OBSTACLES */

    for(let i=obstacles.length-1;i>=0;i--){

        const ob = obstacles[i];

        ob.x -= ob.speed;

        drawObstacle(ob);

        /* COLLISION */

        if(
            player.x < ob.x + ob.width &&
            player.x + player.width > ob.x &&
            player.y < ob.y + ob.height &&
            player.y + player.height > ob.y
        ){
            endGame();
        }

        /* SCORE */

        if(!ob.scored && ob.x + ob.width < player.x){

            ob.scored = true;

            score++;

            scoreEl.innerText = score;
        }

        /* REMOVE */

        if(ob.x < -100){

            obstacles.splice(i,1);
        }
    }

    requestAnimationFrame(update);
}

update();

/* ====================================
   JUMP
==================================== */

function jump(){

    if(player.grounded){

        player.velocityY = player.jumpForce;
        player.grounded = false;
    }
}

/* ====================================
   CONTROLS
==================================== */

document.addEventListener("keydown",(e)=>{

    if(e.code === "Space" || e.code === "ArrowUp"){
        jump();
    }
});

document.getElementById("jumpButton")
.addEventListener("click", jump);

/* ====================================
   FUN BUTTONS
==================================== */

document.getElementById("leftButton")
.addEventListener("click", ()=>{

    widget.style.rotate = "-2deg";
});

document.getElementById("rightButton")
.addEventListener("click", ()=>{

    widget.style.rotate = "2deg";
});

/* ====================================
   GAME OVER
==================================== */

function endGame(){

    gameRunning = false;

    gameOverEl.classList.add("show");
}

restartBtn.addEventListener("click", ()=>{

    obstacles = [];

    score = 0;
    scoreEl.innerText = "0";

    player.y = 145;
    player.velocityY = 0;

    gameRunning = true;

    gameOverEl.classList.remove("show");

    update();
});

</script>
</body>
