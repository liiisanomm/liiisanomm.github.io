<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interactive Computer</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    body {
      background-image: url('https://i.pinimg.com/736x/92/12/80/9212808f9c52e40fa95b53b04b1e54a7.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
    }

    /* Draggable computer */
    #computer {
      position: absolute;
      width: 420px;
      max-width: 70vw;
      cursor: grab;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.05s linear;
      z-index: 10;
      touch-action: none;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
    }

    #computer:active {
      cursor: grabbing;
    }

    /* Optional floating effect */
    @keyframes floaty {
      0% { transform: translate(-50%, -50%) translateY(0px); }
      50% { transform: translate(-50%, -50%) translateY(-6px); }
      100% { transform: translate(-50%, -50%) translateY(0px); }
    }

    .floating {
      animation: floaty 3s ease-in-out infinite;
    }

    /* Mobile optimization */
    @media (max-width: 768px) {
      #computer {
        width: 300px;
      }
    }
  </style>
</head>

<body>

  <!-- Replace computer.png with your uploaded file name -->
  <img
    id="computer"
    class="floating"
    src="computer.png"
    alt="Computer"
    draggable="false"
  />

  <script>
    const computer = document.getElementById("computer");

    let isDragging = false;
    let offsetX = 0;
    let offsetY = 0;

    // Remove translate after first drag
    let centered = true;

    function startDrag(x, y) {
      isDragging = true;

      const rect = computer.getBoundingClientRect();

      offsetX = x - rect.left;
      offsetY = y - rect.top;

      computer.classList.remove("floating");

      if (centered) {
        computer.style.left = rect.left + "px";
        computer.style.top = rect.top + "px";
        computer.style.transform = "none";
        centered = false;
      }
    }

    function drag(x, y) {
      if (!isDragging) return;

      computer.style.left = (x - offsetX) + "px";
      computer.style.top = (y - offsetY) + "px";
    }

    function endDrag() {
      isDragging = false;
    }

    // Mouse Events
    computer.addEventListener("mousedown", (e) => {
      startDrag(e.clientX, e.clientY);
    });

    document.addEventListener("mousemove", (e) => {
      drag(e.clientX, e.clientY);
    });

    document.addEventListener("mouseup", endDrag);

    // Touch Events
    computer.addEventListener("touchstart", (e) => {
      const touch = e.touches[0];
      startDrag(touch.clientX, touch.clientY);
    });

    document.addEventListener("touchmove", (e) => {
      const touch = e.touches[0];
      drag(touch.clientX, touch.clientY);
    });

    document.addEventListener("touchend", endDrag);
  </script>

</body>
</html>
