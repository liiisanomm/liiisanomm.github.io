<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Y2K Red Void</title>

<style>
/* =========================
   Y2K RED / BLACK WALLPAPER
   Single-file GitHub Pages
========================= */

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* Overlay glow */
.overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,0,0,0.08), transparent 40%),
    radial-gradient(circle at 20% 20%, rgba(255,60,60,0.05), transparent 25%),
    radial-gradient(circle at 80% 70%, rgba(255,0,0,0.04), transparent 30%);
  mix-blend-mode: screen;
}

/* Scanlines */
.scanlines::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 1px,
      transparent 2px,
      transparent 4px
    );
  pointer-events: none;
  mix-blend-mode: overlay;
}

/* HUD text */
.hud {
  position: absolute;
  top: 30px;
  left: 40px;
  color: #ff2d2d;
  text-shadow:
    0 0 5px #ff0000,
    0 0 15px #ff0000,
    0 0 30px #ff0000;
  letter-spacing: 5px;
  user-select: none;
}

.hud h1 {
  margin: 0;
  font-size: clamp(32px, 5vw, 72px);
  font-weight: 900;
}

.hud p {
  margin-top: 10px;
  opacity: 0.7;
  font-size: 12px;
}

/* Chrome corner decorations */
.corner {
  position: absolute;
  width: 180px;
  height: 180px;
  border: 2px solid rgba(255,0,0,0.35);
  box-shadow:
    0 0 15px rgba(255,0,0,0.5),
    inset 0 0 25px rgba(255,0,0,0.2);
}

.tl {
  top: 25px;
  left: 25px;
  border-right: none;
  border-bottom: none;
}

.br {
  bottom: 25px;
  right: 25px;
  border-left: none;
  border-top: none;
}

/* Floating UI circles */
.circle {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(255,0,0,0.3);
  box-shadow: 0 0 20px rgba(255,0,0,0.35);
  animation: pulse 5s infinite ease-in-out;
}

.c1 {
  width: 300px;
  height: 300px;
  top: 10%;
  right: 5%;
}

.c2 {
  width: 150px;
  height: 150px;
  bottom: 15%;
  left: 10%;
  animation-delay: -2s;
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    opacity: 0.4;
  }
  50% {
    transform: scale(1.08);
    opacity: 0.8;
  }
}

.center-glow {
  position: absolute;
  width: 700px;
  height: 700px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  background:
    radial-gradient(circle, rgba(255,0,0,0.15), transparent 65%);
  filter: blur(50px);
  pointer-events: none;
}

.instructions {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: rgba(255,255,255,0.4);
  font-size: 11px;
  letter-spacing: 2px;
  user-select: none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="center-glow"></div>

<div class="overlay scanlines"></div>

<div class="corner tl"></div>
<div class="corner br"></div>

<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="hud">
  <h1>RED VOID_2003</h1>
  <p>INTERACTIVE Y2K WALLPAPER</p>
</div>

<div class="instructions">
  MOVE MOUSE • CLICK FOR GLITCH BURST
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w, h;
let particles = [];
let mouse = { x: 0, y: 0 };

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* =========================
   GRID
========================= */

function drawGrid(time) {
  const spacing = 40;

  ctx.save();

  ctx.translate(w / 2, h / 2);

  for (let y = -h; y < h; y += spacing) {
    const perspective = (y + h) / (2 * h);

    ctx.beginPath();
    ctx.strokeStyle = `rgba(255,0,0,${0.02 + perspective * 0.15})`;

    ctx.moveTo(-w, y + Math.sin(time * 0.001 + y * 0.02) * 4);
    ctx.lineTo(w, y);

    ctx.stroke();
  }

  for (let x = -w; x < w; x += spacing) {
    ctx.beginPath();

    const glow = Math.sin(time * 0.002 + x * 0.01);

    ctx.strokeStyle = `rgba(255,20,20,${0.06 + glow * 0.03})`;

    ctx.moveTo(x, -h);
    ctx.lineTo(x, h);

    ctx.stroke();
  }

  ctx.restore();
}

/* =========================
   PARTICLES
========================= */

class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;

    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 6 + 1;

    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;

    this.life = 100;
    this.size = Math.random() * 3 + 1;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life--;

    this.vx *= 0.99;
    this.vy *= 0.99;
  }

  draw() {
    ctx.beginPath();

    ctx.fillStyle = `rgba(255,0,0,${this.life / 100})`;

    ctx.shadowBlur = 20;
    ctx.shadowColor = "#ff0000";

    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);

    ctx.fill();

    ctx.shadowBlur = 0;
  }
}

/* =========================
   ORBS
========================= */

function drawOrbs(time) {
  for (let i = 0; i < 5; i++) {
    const x = w / 2 + Math.sin(time * 0.0004 + i) * 400;
    const y = h / 2 + Math.cos(time * 0.0006 + i * 2) * 250;

    const radius = 60 + Math.sin(time * 0.002 + i) * 20;

    const grad = ctx.createRadialGradient(
      x, y, 0,
      x, y, radius
    );

    grad.addColorStop(0, "rgba(255,0,0,0.35)");
    grad.addColorStop(1, "rgba(255,0,0,0)");

    ctx.fillStyle = grad;

    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* =========================
   MOUSE ENERGY
========================= */

window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

window.addEventListener("click", e => {
  for (let i = 0; i < 80; i++) {
    particles.push(new Particle(e.clientX, e.clientY));
  }
});

/* =========================
   GLITCH LINES
========================= */

function drawGlitches(time) {
  for (let i = 0; i < 10; i++) {
    const y = (Math.sin(time * 0.002 + i * 8) * 0.5 + 0.5) * h;

    ctx.fillStyle = `rgba(255,0,0,${Math.random() * 0.06})`;

    ctx.fillRect(
      Math.random() * 100,
      y,
      w,
      Math.random() * 3
    );
  }
}

/* =========================
   MAIN LOOP
========================= */

function animate(time) {
  ctx.clearRect(0, 0, w, h);

  /* Background gradient */
  const bg = ctx.createRadialGradient(
    w / 2,
    h / 2,
    0,
    w / 2,
    h / 2,
    w
  );

  bg.addColorStop(0, "#220000");
  bg.addColorStop(0.5, "#090000");
  bg.addColorStop(1, "#000000");

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  drawGrid(time);
  drawOrbs(time);

  /* Mouse glow */
  const glow = ctx.createRadialGradient(
    mouse.x,
    mouse.y,
    0,
    mouse.x,
    mouse.y,
    200
  );

  glow.addColorStop(0, "rgba(255,0,0,0.15)");
  glow.addColorStop(1, "rgba(255,0,0,0)");

  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, w, h);

  drawGlitches(time);

  /* Particles */
  particles.forEach((p, i) => {
    p.update();
    p.draw();

    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  });

  requestAnimationFrame(animate);
}

animate(0);
</script>

</body>
</html>
